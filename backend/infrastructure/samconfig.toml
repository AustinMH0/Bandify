version = 0.1

[default.global.parameters]
stack_name = "groovonomy-infrastructure"
region = "us-west-1"

[default.build.parameters]
cached = false
parallel = true
use_container = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
s3_prefix = "playwright-stack"
parameter_overrides = "S3BucketName=\"groovonomy-frontend-bucket\""
resolve_s3 = true
profile = "AdministratorAccess-324938817450"
disable_rollback = true
image_repositories = []
stack_name = "playwright-stack"
